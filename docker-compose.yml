services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-stream_db}
      MYSQL_USER: ${DB_USER:-stream_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8001
      DB_HOST: mysql
      DB_USER: ${DB_USER:-stream_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_NAME: ${DB_NAME:-stream_db}
      NMS_SECRET_KEY: ${NMS_SECRET_KEY:-change-this-secret}
      STREAM_SOURCE: ${STREAM_SOURCE:-file}
      SOURCE_VIDEO_PATH: ${SOURCE_VIDEO_PATH:-/videos/live.mp4}
      HLS_STREAM_NAME: ${HLS_STREAM_NAME:-obs_stream}
      STREAM_LOOP: ${STREAM_LOOP:-1}
      STREAM_REALTIME: ${STREAM_REALTIME:-1}
      FILE_HLS_RESTART: ${FILE_HLS_RESTART:-1}
      SITE_URL: ${SITE_URL:-http://localhost}
    ports:
      - "${API_PORT:-8001}:8001"
      - "${RTMP_PORT:-1935}:1935"
      - "${NMS_HTTP_PORT:-8000}:8000"
    volumes:
      - ./videos:/videos:ro
      - hls_media:/app/media
      - uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:8001}
        VITE_STREAM_FORMAT: ${VITE_STREAM_FORMAT:-hls}
        VITE_HLS_STREAM_NAME: ${HLS_STREAM_NAME:-obs_stream}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mysql_data:
  hls_media:
  uploads:
